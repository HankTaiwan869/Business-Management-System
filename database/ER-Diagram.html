<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business DB — ER Diagram</title>
  <style>
    body { margin: 0; padding: 2rem; font-family: sans-serif; background: #fff; color: #222; }
    h1 { font-size: 1.2rem; font-weight: 500; margin-bottom: 1.5rem; color: #333; }
    #erd svg { width: 100%; height: auto; }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; color: #c2c0b6; }
      h1 { color: #c2c0b6; }
    }
  </style>
</head>
<body>
  <h1>Business DB — ER Diagram</h1>
  <div id="erd"></div>
  <script type="module">
    import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
    const dark = matchMedia('(prefers-color-scheme: dark)').matches;
    mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      fontFamily: 'sans-serif',
      themeVariables: {
        darkMode: dark,
        fontSize: '13px',
        fontFamily: 'sans-serif',
        lineColor: dark ? '#9c9a92' : '#73726c',
        textColor: dark ? '#c2c0b6' : '#3d3d3a',
        primaryColor: dark ? '#3C3489' : '#EEEDFE',
        primaryBorderColor: dark ? '#534AB7' : '#AFA9EC',
        primaryTextColor: dark ? '#CECBF6' : '#26215C',
        secondaryColor: dark ? '#085041' : '#E1F5EE',
        secondaryBorderColor: dark ? '#0F6E56' : '#5DCAA5',
        secondaryTextColor: dark ? '#9FE1CB' : '#04342C',
        tertiaryColor: dark ? '#444441' : '#F1EFE8',
        tertiaryBorderColor: dark ? '#5F5E5A' : '#B4B2A9',
        tertiaryTextColor: dark ? '#D3D1C7' : '#2C2C2A',
      },
    });

    const diagram = `erDiagram
  Settings {
    bool is_in_cycle PK
    int cycle_id
  }
  Customer {
    int id PK
    string name
    float discount
  }
  Cycle {
    int id PK
    string start_date
    string end_date
    float revenue
    float cost
    float profit
  }
  Product {
    int id PK
    string name
  }
  Supplier {
    int id PK
    string name
  }
  CustomerOrder {
    int cycle_id PK,FK
    int customer_id PK,FK
    int product_id PK,FK
    float quantity
    string created_at_timestamp
  }
  ProductPrice {
    int cycle_id PK,FK
    int product_id PK,FK
    float sell_price
    string created_at_timestamp
  }
  SupplyOrder {
    int cycle_id PK,FK
    int supplier_id PK,FK
    int product_id PK,FK
    float buy_price
    float quantity
    string created_at_timestamp
  }

  Cycle ||--o{ CustomerOrder : "has"
  Customer ||--o{ CustomerOrder : "places"
  Product ||--o{ CustomerOrder : "in"
  Cycle ||--o{ ProductPrice : "sets"
  Product ||--o{ ProductPrice : "priced in"
  Cycle ||--o{ SupplyOrder : "has"
  Supplier ||--o{ SupplyOrder : "fulfills"
  Product ||--o{ SupplyOrder : "in"
`;

    const { svg } = await mermaid.render('erd-svg', diagram);
    document.getElementById('erd').innerHTML = svg;

    document.querySelectorAll('#erd svg .node').forEach(node => {
      const firstPath = node.querySelector('path[d]');
      if (!firstPath) return;
      const d = firstPath.getAttribute('d');
      const nums = d.match(/-?[\d.]+/g)?.map(Number);
      if (!nums || nums.length < 8) return;
      const xs = [nums[0], nums[2], nums[4], nums[6]];
      const ys = [nums[1], nums[3], nums[5], nums[7]];
      const x = Math.min(...xs), y = Math.min(...ys);
      const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', x); rect.setAttribute('y', y);
      rect.setAttribute('width', w); rect.setAttribute('height', h);
      rect.setAttribute('rx', '8');
      for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
        if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
      }
      firstPath.replaceWith(rect);
    });

    document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
      p.setAttribute('stroke', 'none');
    });
  </script>
</body>
</html>
